<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguaQuest</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg: #0a0a14; --card: #141428; --accent: #7c3aed; --text: #f1f5f9; --muted: #94a3b8;
        }
        body { font-family: 'Nunito', sans-serif; background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }
        .screen { display: none; padding: 20px; min-height: 100vh; }
        .screen.active { display: block; }
        .top-bar, .nav-bar { display: none; position: fixed; width: 100%; background: var(--card); z-index: 100; }
        .top-bar { top: 0; height: 60px; align-items: center; justify-content: space-between; padding: 0 15px; border-bottom: 1px solid #222; }
        .nav-bar { bottom: 0; height: 70px; justify-content: space-around; align-items: center; border-top: 1px solid #222; }
        .auth-container { max-width: 400px; margin: 100px auto; padding: 20px; background: var(--card); border-radius: 16px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid #333; background: #000; color: white; }
        .btn-primary { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold; }
        .err-msg { color: #ff4444; font-size: 0.9rem; margin-top: 10px; display: none; }
        .err-msg.show { display: block; }
        .nav-item.active { color: var(--accent); }
    </style>
</head>
<body>

    <div id="top-bar" class="top-bar">
        <div style="font-family:'Fredoka One'; font-size: 1.2rem;">LinguaQuest</div>
        <div id="top-stats">💰 <span id="ps-coins">0</span></div>
    </div>

    <div id="app">
        <div id="screen-auth" class="screen active">
            <div class="auth-container">
                <h2 id="tab-login">Connexion</h2>
                <div id="form-login">
                    <input type="email" id="login-email" placeholder="Email">
                    <input type="password" id="login-pass" placeholder="Mot de passe">
                    <button class="btn-primary" onclick="doLogin()">Se connecter</button>
                    <div id="login-err" class="err-msg"></div>
                </div>
                <hr style="margin:20px 0; opacity:0.1;">
                <button id="btn-guest" class="btn-primary" style="background:#333;">Mode Invité</button>
            </div>
        </div>

        <div id="screen-learn" class="screen">
            <div style="margin-top:70px;">
                <h1>Tableau de Bord</h1>
                <p>Bienvenue sur votre espace d'apprentissage.</p>
