<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>LinguaRace</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{
  font-family:'Nunito',sans-serif;background:#03030a;
  overflow:hidden;width:100vw;height:100vh;display:flex;
  flex-direction:column;align-items:center;touch-action:none;
  user-select:none;
}
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&display=swap');

canvas{display:block;max-width:100%;image-rendering:pixelated;}

/* ── SCREENS ── */
.scr{display:none;position:fixed;inset:0;flex-direction:column;
  align-items:center;justify-content:center;z-index:10;padding:16px;}
.scr.on{display:flex;}

/* ── HUD ── */
#hud{
  position:fixed;top:0;left:0;right:0;z-index:20;
  display:none;flex-direction:column;align-items:center;
  pointer-events:none;padding:8px 12px 0;
}
.hud-top{
  width:100%;max-width:420px;display:flex;
  align-items:center;gap:8px;
}
.hud-btn-close{
  pointer-events:all;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.15);
  border-radius:8px;padding:4px 10px;color:#fff;font-size:.7rem;
  font-weight:800;cursor:pointer;flex-shrink:0;
}
.lives-row{display:flex;gap:3px;margin-left:auto;}
.heart{font-size:1.1rem;transition:transform .2s;}
.heart.lost{opacity:.25;transform:scale(.8);}
.score-chip{
  background:rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.15);
  border-radius:20px;padding:4px 12px;font-weight:900;font-size:.85rem;
  color:#fbbf24;
}
.combo-chip{
  background:linear-gradient(135deg,#7c3aed,#ec4899);
  border-radius:20px;padding:3px 10px;font-weight:900;font-size:.75rem;
  color:#fff;transition:all .2s;
}

/* Question banner */
#q-banner{
  width:100%;max-width:420px;
  background:linear-gradient(135deg,rgba(0,0,0,.8),rgba(10,10,30,.9));
  border:1px solid rgba(124,58,237,.3);border-radius:14px;
  padding:10px 16px;margin-top:6px;text-align:center;
  display:none;backdrop-filter:blur(8px);
}
#q-native{font-size:1.3rem;font-weight:900;color:#fff;}
#q-dir{font-size:.68rem;color:rgba(255,255,255,.4);font-weight:700;margin-top:1px;}

/* Boost bar */
#boost-bar-wrap{
  width:100%;max-width:420px;height:4px;
  background:rgba(255,255,255,.08);border-radius:2px;margin-top:4px;display:none;
}
#boost-bar{height:100%;width:0%;border-radius:2px;
  background:linear-gradient(90deg,#f97316,#fbbf24);transition:width .3s;}

/* ── D-PAD ── */
#dpad{
  position:fixed;bottom:16px;left:50%;transform:translateX(-50%);
  z-index:20;display:none;gap:8px;align-items:center;
  pointer-events:all;
}
.dpad-btn{
  width:56px;height:56px;border-radius:16px;
  background:rgba(255,255,255,.1);border:2px solid rgba(255,255,255,.2);
  font-size:1.4rem;display:flex;align-items:center;justify-content:center;
  cursor:pointer;active:opacity:.7;transition:background .1s;
}
.dpad-btn:active{background:rgba(255,255,255,.25);}
.dpad-mid{display:flex;flex-direction:column;gap:8px;align-items:center;}
.dpad-btn-sm{
  width:44px;height:44px;border-radius:12px;
  background:rgba(255,165,0,.15);border:1.5px solid rgba(255,165,0,.3);
  font-size:1rem;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:background .1s;
}
.dpad-btn-sm:active{background:rgba(255,165,0,.35);}
#nitro-btn{
  width:60px;height:60px;border-radius:50%;
  background:linear-gradient(135deg,#f97316,#fbbf24);
  border:2px solid rgba(255,255,255,.3);
  font-size:1.5rem;display:flex;align-items:center;justify-content:center;
  cursor:pointer;box-shadow:0 0 20px rgba(249,115,22,.4);
  transition:all .15s;
}
#nitro-btn:active{transform:scale(.92);}
#nitro-btn.empty{opacity:.4;background:rgba(255,255,255,.1);box-shadow:none;}

/* ── START SCREEN ── */
.start-card{
  background:rgba(10,10,24,.95);border:1px solid rgba(124,58,237,.25);
  border-radius:24px;padding:24px 20px;width:100%;max-width:380px;
  backdrop-filter:blur(16px);
}
.game-title{
  font-size:2rem;font-weight:900;text-align:center;margin-bottom:4px;
  background:linear-gradient(135deg,#fbbf24,#f97316,#ec4899);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.game-sub{
  text-align:center;color:rgba(255,255,255,.4);font-size:.78rem;
  margin-bottom:18px;
}
.skin-grid{
  display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:18px;
}
.skin-card{
  border-radius:12px;padding:8px;border:2px solid rgba(255,255,255,.08);
  cursor:pointer;text-align:center;transition:all .15s;
  background:rgba(255,255,255,.04);
}
.skin-card.sel{border-color:var(--c,#7c3aed);background:rgba(124,58,237,.12);}
.skin-canvas{display:block;margin:0 auto 4px;}
.skin-name{font-size:.68rem;font-weight:800;color:rgba(255,255,255,.6);}
.diff-row{display:flex;gap:6px;margin-bottom:16px;}
.diff-btn{
  flex:1;padding:8px;border-radius:10px;border:1px solid rgba(255,255,255,.1);
  background:rgba(255,255,255,.04);color:rgba(255,255,255,.5);
  font-family:'Nunito';font-weight:800;font-size:.75rem;cursor:pointer;
  transition:all .15s;
}
.diff-btn.sel{border-color:#7c3aed;background:rgba(124,58,237,.15);color:#c4b5fd;}
.btn-start{
  width:100%;padding:14px;border:none;border-radius:14px;
  background:linear-gradient(135deg,#7c3aed,#ec4899);
  color:#fff;font-family:'Nunito';font-weight:900;font-size:1rem;
  cursor:pointer;box-shadow:0 0 30px rgba(124,58,237,.4);
  transition:all .2s;
}
.btn-start:hover{filter:brightness(1.1);transform:translateY(-2px);}

/* ── RESULT ── */
#result-scr{background:rgba(4,4,16,.95);}
.res-medal{font-size:4rem;margin-bottom:6px;}
.res-title{font-size:1.8rem;font-weight:900;text-align:center;
  background:linear-gradient(135deg,#fbbf24,#f97316);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.res-pts{font-size:2.5rem;font-weight:900;color:#fbbf24;}
.res-sub{color:rgba(255,255,255,.4);font-size:.82rem;margin:6px 0 16px;}
.res-grid{display:flex;gap:14px;margin-bottom:18px;}
.res-stat{text-align:center;}
.res-stat-n{font-size:1.4rem;font-weight:900;color:#fff;}
.res-stat-l{font-size:.65rem;color:rgba(255,255,255,.4);font-weight:800;
  text-transform:uppercase;letter-spacing:1px;}
.res-btns{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;width:100%;}
.btn-res{
  padding:12px 22px;border-radius:12px;font-family:'Nunito';
  font-weight:900;font-size:.9rem;cursor:pointer;transition:all .15s;
  border:none;
}
.btn-res-primary{background:linear-gradient(135deg,#7c3aed,#ec4899);color:#fff;}
.btn-res-gray{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);}

/* ── POWERUP TOAST ── */
.pu-toast{
  position:fixed;top:130px;left:50%;transform:translateX(-50%);
  background:rgba(0,0,0,.85);border:1px solid rgba(255,255,255,.2);
  border-radius:10px;padding:6px 16px;font-weight:900;font-size:.82rem;
  color:#fff;z-index:30;opacity:0;transition:opacity .3s;pointer-events:none;
}
</style>
</head>
<body>

<!-- Canvas -->
<canvas id="c"></canvas>

<!-- HUD -->
<div id="hud">
  <div class="hud-top">
    <button class="hud-btn-close" onclick="quitGame()">✕</button>
    <div class="score-chip" id="score-disp">⭐ 0</div>
    <div class="combo-chip" id="combo-chip" style="display:none;">🔥 x2</div>
    <div class="lives-row" id="lives-row"></div>
  </div>
  <div id="q-banner">
    <div id="q-native">—</div>
    <div id="q-dir">Quelle est la traduction ?</div>
  </div>
  <div id="boost-bar-wrap"><div id="boost-bar"></div></div>
</div>

<!-- D-Pad -->
<div id="dpad">
  <div class="dpad-btn" id="dpad-left">◀</div>
  <div class="dpad-mid">
    <div class="dpad-btn-sm" id="dpad-up">▲</div>
    <div class="dpad-btn-sm" id="dpad-down">▼</div>
  </div>
  <div class="dpad-btn" id="dpad-right">▶</div>
  <div id="nitro-btn" title="Nitro boost (3 bonnes réponses)">⚡</div>
</div>

<!-- START SCREEN -->
<div class="scr on" id="start-scr">
  <div class="start-card">
    <div class="game-title">🏎 LinguaRace</div>
    <div class="game-sub">Percute la bonne traduction — évite les fausses !</div>

    <!-- Car skins -->
    <div class="skin-grid" id="skin-grid"></div>

    <!-- Difficulty -->
    <div style="font-size:.68rem;font-weight:900;color:rgba(255,255,255,.4);
      letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">Difficulté</div>
    <div class="diff-row" id="diff-row">
      <button class="diff-btn sel" onclick="setDiff(0,this)">🐢 Débutant</button>
      <button class="diff-btn" onclick="setDiff(1,this)">🐇 Normal</button>
      <button class="diff-btn" onclick="setDiff(2,this)">🔥 Expert</button>
    </div>

    <button class="btn-start" onclick="startGame()">🚀 Démarrer !</button>
  </div>
</div>

<!-- RESULT SCREEN -->
<div class="scr" id="result-scr">
  <div class="res-medal" id="res-medal">🏆</div>
  <div class="res-title" id="res-title">Champion !</div>
  <div class="res-pts" id="res-pts">0 pts</div>
  <div class="res-sub" id="res-sub">Super course !</div>
  <div class="res-grid">
    <div class="res-stat"><div class="res-stat-n" id="rs-correct">0</div><div class="res-stat-l">✅ Justes</div></div>
    <div class="res-stat"><div class="res-stat-n" id="rs-wrong">0</div><div class="res-stat-l">❌ Ratés</div></div>
    <div class="res-stat"><div class="res-stat-n" id="rs-combo">0</div><div class="res-stat-l">🔥 Combo max</div></div>
    <div class="res-stat"><div class="res-stat-n" id="rs-speed">0</div><div class="res-stat-l">⚡ Km/h max</div></div>
  </div>
  <div class="res-btns">
    <button class="btn-res btn-res-primary" onclick="restartGame()">🔄 Rejouer</button>
    <button class="btn-res btn-res-gray" onclick="window.parent.postMessage({type:'studyChapter'},'*')">📚 Réviser</button>
    <button class="btn-res btn-res-gray" onclick="window.parent.postMessage('close','*')">✕ Quitter</button>
  </div>
</div>

<!-- Powerup toast -->
<div class="pu-toast" id="pu-toast"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  LINGUARACE — full rewrite
// ═══════════════════════════════════════════════════════════

// Word data from parent
let WD={}, CHAPTERS=null;
let _practiceWids=null;
const params=new URLSearchParams(location.search);
const nL=params.get('nL')||'fr';
const tL=params.get('tL')||'en';
let diff=1; // 0=easy,1=normal,2=expert

window.addEventListener('message',e=>{
  if(e.data?.type==='wordData'){
    WD=e.data.words||{};
    CHAPTERS=e.data.chapters||null;
    if(e.data.practiceWids) _practiceWids=e.data.practiceWids;
    buildSkinGrid();
  }
});
window.parent.postMessage({type:'getWordData'},'*');
setTimeout(()=>{if(!Object.keys(WD).length){WD={hello:{fr:'Bonjour',en:'Hello'},cat:{fr:'Chat',en:'Cat'},dog:{fr:'Chien',en:'Dog'},house:{fr:'Maison',en:'House'},book:{fr:'Livre',en:'Book'},eat:{fr:'Manger',en:'Eat'},run:{fr:'Courir',en:'Run'},big:{fr:'Grand',en:'Big'},happy:{fr:'Heureux',en:'Happy'},water:{fr:'Eau',en:'Water'}};buildSkinGrid();}},1500);

// ── CAR SKINS ───────────────────────────────────────────────
const SKINS=[
  {id:'red',    name:'Turbo',   body:'#dc2626',top:'#7f1d1d',trim:'#fca5a5',glow:'rgba(220,38,38,.6)'},
  {id:'blue',   name:'Nitro',   body:'#1d4ed8',top:'#1e3a8a',trim:'#93c5fd',glow:'rgba(29,78,216,.6)'},
  {id:'gold',   name:'Champ',   body:'#d97706',top:'#78350f',trim:'#fde68a',glow:'rgba(217,119,6,.6)'},
  {id:'green',  name:'Éco',     body:'#059669',top:'#064e3b',trim:'#6ee7b7',glow:'rgba(5,150,105,.6)'},
  {id:'purple', name:'Cyber',   body:'#7c3aed',top:'#3b0764',trim:'#c4b5fd',glow:'rgba(124,58,237,.6)'},
  {id:'ghost',  name:'Fantôme', body:'#334155',top:'#0f172a',trim:'#94a3b8',glow:'rgba(51,65,85,.6)'},
];
let activeSkin=SKINS[0];

function buildSkinGrid(){
  const g=document.getElementById('skin-grid');
  if(!g)return;
  g.innerHTML='';
  SKINS.forEach(sk=>{
    const card=document.createElement('div');
    card.className='skin-card'+(sk.id===activeSkin.id?' sel':'');
    card.style.setProperty('--c',sk.body);
    // Mini canvas preview
    const mc=document.createElement('canvas');
    mc.width=60;mc.height=80;mc.className='skin-canvas';
    drawCar(mc.getContext('2d'),30,40,sk,true,0.7);
    const nm=document.createElement('div');
    nm.className='skin-name';nm.textContent=sk.name;
    card.appendChild(mc);card.appendChild(nm);
    card.onclick=()=>{
      activeSkin=sk;
      document.querySelectorAll('.skin-card').forEach(c=>c.classList.remove('sel'));
      card.classList.add('sel');
      window.parent.postMessage({type:'saveCarSkin',skin:sk.id},'*');
    };
    g.appendChild(card);
  });
  // Restore saved skin
  const sc=params.get('carSkin');
  if(sc){const s=SKINS.find(x=>x.id===sc);if(s){activeSkin=s;buildSkinGrid();}}
}

function setDiff(d,btn){
  diff=d;
  document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel');
}

// ── CANVAS & WORLD ──────────────────────────────────────────
const canvas=document.getElementById('c');
const ctx=canvas.getContext('2d');
let W,H,animId,running=false;

function resize(){
  W=canvas.width=window.innerWidth;
  H=canvas.height=window.innerHeight;
  if(running){car.y=H*0.78;car.x=laneX(car.lane);car.targetX=car.x;}
}
resize();
window.addEventListener('resize',resize);

// Road
const LANES=4;
const ROAD_W_MAX=320;
let ROAD_W,ROAD_X;
let roadOffset=0;

// Game vars
let car,targets,particles,wordList,currentQ;
let totalAnswered,totalWrong,maxCombo,maxSpeed;
let frameN,combo,lives,boostCharge,nitroActive,nitroTimer;
let spawnTimer=0;

function laneX(l){return ROAD_X+28+l*(ROAD_W-56)/(LANES-1);}

// ── WORD POOL ──────────────────────────────────────────────
function getWords(){
  const pool=_practiceWids||Object.keys(WD).filter(id=>WD[id][nL]&&WD[id][tL]);
  return pool.map(id=>({id,native:WD[id][nL],target:WD[id][tL]})).filter(w=>w.native&&w.target);
}

// ── START ──────────────────────────────────────────────────
function startGame(){
  wordList=getWords().sort(()=>Math.random()-.5).slice(0,20);
  if(!wordList.length){showToast('Pas de mots chargés !');return;}

  ROAD_W=Math.min(ROAD_W_MAX,W-32);
  ROAD_X=(W-ROAD_W)/2;

  car={lane:Math.floor(LANES/2),x:0,y:0,targetX:0,score:0,alive:true,invincible:0,skidX:0};
  car.x=laneX(car.lane);car.targetX=car.x;car.y=H*0.78;

  targets=[];particles=[];spawnTimer=0;
  totalAnswered=0;totalWrong=0;maxCombo=0;maxSpeed=0;
  frameN=0;combo=0;lives=3;boostCharge=0;nitroActive=false;nitroTimer=0;

  const baseSpeed=[1.8,2.8,4.2][diff];
  window._baseSpeed=baseSpeed;
  window._roadSpeed=baseSpeed;

  document.getElementById('start-scr').classList.remove('on');
  document.getElementById('result-scr').classList.remove('on');
  document.getElementById('hud').style.display='flex';
  document.getElementById('dpad').style.display='flex';
  document.getElementById('q-banner').style.display='block';
  document.getElementById('boost-bar-wrap').style.display='block';

  renderLives();
  pickQuestion();
  running=true;
  cancelAnimationFrame(animId);
  animId=requestAnimationFrame(loop);
  bindInput();
}

function quitGame(){
  running=false;cancelAnimationFrame(animId);
  document.getElementById('hud').style.display='none';
  document.getElementById('dpad').style.display='none';
  document.getElementById('q-banner').style.display='none';
  document.getElementById('start-scr').classList.add('on');
}
function restartGame(){
  document.getElementById('result-scr').classList.remove('on');
  startGame();
}

// ── LIVES ─────────────────────────────────────────────────
function renderLives(){
  const el=document.getElementById('lives-row');
  el.innerHTML=[0,1,2].map(i=>`<span class="heart${i>=lives?' lost':''}">❤️</span>`).join('');
}

// ── QUESTION ──────────────────────────────────────────────
function pickQuestion(){
  currentQ=wordList[Math.floor(Math.random()*wordList.length)];
  document.getElementById('q-native').textContent=currentQ.native;
  document.getElementById('q-dir').textContent='→ '+tL.toUpperCase()+' ?';
  speakWord(currentQ.native,nL);
}

function speakWord(t,l){
  if(!t||!window.speechSynthesis)return;
  speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(t);
  u.lang={fr:'fr-FR',en:'en-GB',es:'es-ES',de:'de-DE',cs:'cs-CZ'}[l]||'fr-FR';
  u.rate=0.9;speechSynthesis.speak(u);
}

// ── SPAWN ─────────────────────────────────────────────────
// Powerups
const POWERUPS=['shield','slow','hint'];

function spawnTarget(){
  const lane=Math.floor(Math.random()*LANES);
  const others=wordList.filter(w=>w.id!==currentQ?.id);
  const wrong=others.length?others[Math.floor(Math.random()*others.length)]:wordList[0];
  const isCorrect=Math.random()>0.45;

  const sp=window._roadSpeed||2.8;
  targets.push({
    type:'word',
    lane,x:laneX(lane),y:-70,
    label:isCorrect?currentQ?.target:wrong?.target,
    correct:isCorrect,
    speed:sp*0.9+Math.random()*sp*0.4,
    passed:false,
    w:68,h:44,
    color:isCorrect?'#1e3a5f':'#3b0764',
    border:isCorrect?'#3b82f6':'#7c3aed',
    textColor:isCorrect?'#93c5fd':'#c4b5fd',
  });
}

function maybeSpawnPowerup(){
  if(Math.random()>.004)return;
  const lane=Math.floor(Math.random()*LANES);
  const type=POWERUPS[Math.floor(Math.random()*POWERUPS.length)];
  targets.push({
    type:'powerup',pu:type,
    lane,x:laneX(lane),y:-50,
    speed:(window._roadSpeed||2.8)*0.7,
    passed:false,w:44,h:44,
  });
}

// ── LOOP ──────────────────────────────────────────────────
function loop(){
  frameN++;
  update();render();
  if(running)animId=requestAnimationFrame(loop);
}

function update(){
  if(!car.alive)return;
  const sp=window._roadSpeed||2.8;

  // Smooth car move
  car.x+=(car.targetX-car.x)*0.2;
  car.skidX*=0.85;

  // Invincibility
  if(car.invincible>0)car.invincible--;

  // Nitro
  if(nitroActive){
    nitroTimer--;
    window._roadSpeed=Math.min(sp+3,10);
    if(nitroTimer<=0){nitroActive=false;window._roadSpeed=window._baseSpeed+totalAnswered*0.12;}
  }

  // Road scroll
  roadOffset=(roadOffset+sp*2)%(H/4);
  const targetSpeed=window._baseSpeed+totalAnswered*0.12+(nitroActive?3:0);
  window._roadSpeed+=(targetSpeed-window._roadSpeed)*0.05;
  maxSpeed=Math.max(maxSpeed,Math.round(sp*30));

  // Spawn
  spawnTimer++;
  const spawnInterval=Math.max(28,60-totalAnswered*1.5-(diff*8));
  if(spawnTimer>spawnInterval){spawnTimer=0;spawnTarget();}
  maybeSpawnPowerup();

  // Move targets
  targets.forEach(t=>{
    t.y+=t.speed+(sp-2.8)*0.5;
    t.x+=(laneX(t.lane)-t.x)*0.12;
  });

  // Collision
  if(car.invincible===0){
    targets.forEach(t=>{
      if(t.passed)return;
      const dx=Math.abs(car.x-t.x),dy=Math.abs(car.y-t.y);
      const hitW=t.w/2+16,hitH=t.h/2+22;
      if(dx<hitW&&dy<hitH){
        t.passed=true;
        if(t.type==='powerup'){
          applyPowerup(t.pu);
        } else if(t.correct){
          onCorrect(t);
        } else {
          onWrong(t);
        }
      }
    });
  }

  targets=targets.filter(t=>t.y<H+120);

  // Particles
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life-=0.025+(p.fast||0);p.size*=0.94;});
  particles=particles.filter(p=>p.life>0);

  // Boost bar
  document.getElementById('boost-bar').style.width=(boostCharge/3*100)+'%';
  const nb=document.getElementById('nitro-btn');
  if(nb) nb.className=(boostCharge>=3&&!nitroActive)?'':'empty';
}

function onCorrect(t){
  combo++;totalAnswered++;
  maxCombo=Math.max(maxCombo,combo);
  const mult=combo>=5?3:combo>=3?2:1;
  const pts=10*mult;
  car.score+=pts;
  boostCharge=Math.min(3,boostCharge+1);
  spawnFX(t.x,t.y,combo>=3?'#fbbf24':'#22c55e',16);
  floatText(t.x,t.y-20,'+'+pts+(mult>1?' x'+mult:''),'#22c55e');
  document.getElementById('score-disp').textContent='⭐ '+car.score;
  if(combo>=2){
    document.getElementById('combo-chip').style.display='';
    document.getElementById('combo-chip').textContent='🔥 x'+Math.min(combo,9);
  }
  speakWord(currentQ.target,tL);
  pickQuestion();
  if(totalAnswered>=15) endGame();
}

function onWrong(t){
  combo=0;totalWrong++;
  document.getElementById('combo-chip').style.display='none';
  lives--;renderLives();
  car.invincible=90;
  spawnFX(t.x,t.y,'#ef4444',10);
  spawnSmoke(car.x,car.y);
  floatText(car.x,car.y-30,'💥 Mauvais !','#ef4444');
  if(lives<=0){car.alive=false;setTimeout(endGame,700);}
}

function applyPowerup(type){
  if(type==='shield'){car.invincible=180;showToast('🛡 Bouclier activé !');}
  else if(type==='slow'){window._baseSpeed=Math.max(1,window._baseSpeed-1);showToast('🐢 Ralentissement !');}
  else if(type==='hint'){speakWord(currentQ.target,tL);showToast('💡 Indice sonore !');}
  spawnFX(car.x,car.y,'#fbbf24',12);
}

function activateNitro(){
  if(boostCharge<3||nitroActive)return;
  boostCharge=0;nitroActive=true;nitroTimer=120;
  showToast('⚡ NITRO !');
  spawnFX(car.x,car.y+30,'#f97316',20);
}

// ── PARTICLES ─────────────────────────────────────────────
function spawnFX(x,y,color,n=12){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*5;
    particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,life:1,color,size:3+Math.random()*5});
  }
}
function spawnSmoke(x,y){
  for(let i=0;i<8;i++){
    particles.push({x:x+(Math.random()-0.5)*20,y:y+20,vx:(Math.random()-0.5)*1.5,vy:-1.5-Math.random(),life:1,color:'rgba(100,100,120,.6)',size:8+Math.random()*12,fast:0.02});
  }
}
// Floating text
let floatTexts=[];
function floatText(x,y,text,color){
  floatTexts.push({x,y,text,color,life:1,vy:-1.5});
}

// ── RENDER ────────────────────────────────────────────────
function render(){
  // Sky gradient — animated time of day based on score
  const t=totalAnswered/15;
  const skyTop=lerpColor('#03030a','#0a0a2e',t);
  const skyBot=lerpColor('#05051a','#0d0d3a',t);
  const grd=ctx.createLinearGradient(0,0,0,H);
  grd.addColorStop(0,skyTop);grd.addColorStop(1,skyBot);
  ctx.fillStyle=grd;ctx.fillRect(0,0,W,H);

  // Stars
  ctx.fillStyle='rgba(255,255,255,.4)';
  for(let i=0;i<40;i++){
    const sx=((i*137+frameN*0.02)%W),sy=((i*71)%H*0.5);
    const ss=0.5+Math.sin(frameN*0.05+i)*0.5;
    ctx.globalAlpha=ss*0.5;ctx.fillRect(sx,sy,1,1);
  }
  ctx.globalAlpha=1;

  // City skyline
  drawSkyline();

  // Road
  drawRoad();

  // Targets
  targets.forEach(drawTarget);

  // Player car
  drawPlayerCar();

  // Particles
  particles.forEach(p=>{
    ctx.globalAlpha=p.life;ctx.fillStyle=p.color;
    ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;

  // Float texts
  floatTexts.forEach((ft,i)=>{
    ctx.globalAlpha=ft.life;ctx.fillStyle=ft.color;
    ctx.font='bold 15px Nunito,system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(ft.text,ft.x,ft.y);
    ft.y+=ft.vy;ft.life-=0.04;
  });
  floatTexts=floatTexts.filter(f=>f.life>0);
  ctx.globalAlpha=1;

  // Speed indicator
  const kmh=Math.round((window._roadSpeed||2)*30);
  ctx.fillStyle=nitroActive?'#fbbf24':'rgba(255,255,255,.25)';
  ctx.font=`bold ${nitroActive?'13':'11'}px system-ui`;
  ctx.textAlign='right';ctx.textBaseline='bottom';
  ctx.fillText(kmh+' km/h',W-8,H-8);
  ctx.textAlign='left';

  // Shield aura
  if(car.invincible>0&&Math.floor(car.invincible/6)%2===0){
    ctx.strokeStyle='rgba(6,182,212,.6)';ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(car.x,car.y,28,0,Math.PI*2);ctx.stroke();
  }
}

function drawSkyline(){
  // Buildings silhouette
  ctx.fillStyle='rgba(5,5,20,.8)';
  const buildings=[[0,80,60,H*0.25],[70,90,50,H*0.3],[130,60,80,H*0.22],[220,100,40,H*0.35],
    [W-260,90,50,H*0.3],[W-200,70,80,H*0.25],[W-110,85,60,H*0.28],[W-40,75,50,H*0.22]];
  buildings.forEach(([x,w,rw,rh])=>{
    ctx.fillRect(x,H*0.55-rh,rw,rh+20);
    // Windows
    ctx.fillStyle='rgba(255,220,100,.15)';
    for(let wy=H*0.55-rh+10;wy<H*0.55-10;wy+=16){
      for(let wx=x+8;wx<x+rw-8;wx+=14){
        if(Math.random()>0.3)ctx.fillRect(wx,wy,8,8);
      }
    }
    ctx.fillStyle='rgba(5,5,20,.8)';
  });
}

function drawRoad(){
  const rx=ROAD_X,rw=ROAD_W;

  // Road surface
  const roadGrd=ctx.createLinearGradient(rx,0,rx+rw,0);
  roadGrd.addColorStop(0,'#111122');
  roadGrd.addColorStop(0.5,'#18182e');
  roadGrd.addColorStop(1,'#111122');
  ctx.fillStyle=roadGrd;ctx.fillRect(rx,H*0.35,rw,H*0.65);

  // Neon lane lines
  const sp=window._roadSpeed||2.8;
  ctx.setLineDash([36,18]);ctx.lineDashOffset=-roadOffset*2;
  for(let l=1;l<LANES;l++){
    const lx=rx+l*(rw/LANES);
    const alpha=nitroActive?0.8:0.3;
    ctx.strokeStyle=`rgba(124,58,237,${alpha})`;
    ctx.lineWidth=2;ctx.shadowColor='#7c3aed';ctx.shadowBlur=nitroActive?12:4;
    ctx.beginPath();ctx.moveTo(lx,H*0.35);ctx.lineTo(lx,H);ctx.stroke();
  }
  ctx.setLineDash([]);ctx.shadowBlur=0;

  // Road edge neon glow
  [rx,rx+rw].forEach(ex=>{
    ctx.strokeStyle='rgba(249,115,22,.7)';ctx.lineWidth=3;
    ctx.shadowColor='#f97316';ctx.shadowBlur=10;
    ctx.beginPath();ctx.moveTo(ex,H*0.35);ctx.lineTo(ex,H);ctx.stroke();
  });
  ctx.shadowBlur=0;

  // Perspective converge lines from horizon
  const hx=W/2,hy=H*0.35;
  ctx.strokeStyle='rgba(255,255,255,.04)';ctx.lineWidth=1;
  ctx.beginPath();ctx.moveTo(hx,hy);ctx.lineTo(rx,H);ctx.stroke();
  ctx.beginPath();ctx.moveTo(hx,hy);ctx.lineTo(rx+rw,H);ctx.stroke();

  // Roadside details: streetlights
  for(let y=((-roadOffset*3)%200)-200;y<H+200;y+=200){
    drawLamp(rx-30,y);
    drawLamp(rx+rw+10,y);
  }
}

function drawLamp(x,y){
  ctx.fillStyle='#1e293b';ctx.fillRect(x+6,y-60,4,60);
  ctx.fillStyle='#334155';ctx.fillRect(x,y-62,20,8);
  // Light glow
  const grd=ctx.createRadialGradient(x+10,y-58,1,x+10,y-58,30);
  grd.addColorStop(0,'rgba(255,220,100,.3)');
  grd.addColorStop(1,'rgba(255,220,100,0)');
  ctx.fillStyle=grd;ctx.fillRect(x-20,y-88,60,60);
  ctx.fillStyle='#fde68a';ctx.fillRect(x+2,y-64,16,4);
}

function drawTarget(t){
  ctx.save();ctx.translate(t.x,t.y);

  if(t.type==='powerup'){
    // Powerup collectible — spinning icon
    const angle=frameN*0.05;
    ctx.rotate(angle);
    const icon={shield:'🛡',slow:'🐢',hint:'💡'}[t.pu]||'⭐';
    const grd=ctx.createRadialGradient(0,0,4,0,0,24);
    grd.addColorStop(0,'rgba(251,191,36,.3)');
    grd.addColorStop(1,'rgba(251,191,36,0)');
    ctx.fillStyle=grd;ctx.beginPath();ctx.arc(0,0,24,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(251,191,36,.6)';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,0,20,0,Math.PI*2);ctx.stroke();
    ctx.font='1.4rem system-ui';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(icon,0,0);
    ctx.restore();return;
  }

  const W2=t.w/2,H2=t.h/2;
  // Car body shadow
  ctx.fillStyle='rgba(0,0,0,.4)';ctx.beginPath();
  ctx.ellipse(0,H2+6,W2-4,7,0,0,Math.PI*2);ctx.fill();

  // Car body
  ctx.shadowColor=t.border;ctx.shadowBlur=10;
  ctx.fillStyle=t.color;
  ctx.beginPath();if(ctx.roundRect)ctx.roundRect(-W2,-H2,t.w,t.h,8);else ctx.rect(-W2,-H2,t.w,t.h);
  ctx.fill();ctx.shadowBlur=0;

  // Border
  ctx.strokeStyle=t.border;ctx.lineWidth=2;
  ctx.beginPath();if(ctx.roundRect)ctx.roundRect(-W2,-H2,t.w,t.h,8);else ctx.rect(-W2,-H2,t.w,t.h);
  ctx.stroke();

  // Word label
  ctx.fillStyle=t.textColor;ctx.font='bold 12px Nunito,system-ui';
  ctx.textAlign='center';ctx.textBaseline='middle';
  const maxW=t.w-12;
  const label=t.label||'';
  ctx.fillText(label,0,0,maxW);

  // Wheels
  ctx.fillStyle='#0f172a';
  [[-W2-3,-H2+8],[W2+3,-H2+8],[-W2-3,H2-8],[W2+3,H2-8]].forEach(([wx,wy])=>{
    ctx.beginPath();ctx.ellipse(wx,wy,5,8,0,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1;ctx.stroke();
  });

  ctx.restore();
}

function drawPlayerCar(){
  ctx.save();ctx.translate(car.x+car.skidX,car.y);
  if(car.invincible>0&&Math.floor(car.invincible/6)%2===0)ctx.globalAlpha=0.5;
  drawCar(ctx,0,0,activeSkin,true,1);
  ctx.restore();
}

function drawCar(c,x,y,sk,isPlayer,scale){
  c.save();c.translate(x,y);c.scale(scale||1,scale||1);
  const w=38,h=58;
  const half_w=w/2,half_h=h/2;

  // Shadow
  c.fillStyle='rgba(0,0,0,.35)';c.beginPath();
  c.ellipse(0,half_h+6,half_w,7,0,0,Math.PI*2);c.fill();

  // Body glow
  if(isPlayer){c.shadowColor=sk.glow||sk.body;c.shadowBlur=nitroActive?24:14;}
  c.fillStyle=sk.body;c.beginPath();
  if(c.roundRect)c.roundRect(-half_w,-half_h,w,h,8);else c.rect(-half_w,-half_h,w,h);c.fill();
  c.shadowBlur=0;

  // Cabin top
  c.fillStyle=sk.top;c.beginPath();
  if(c.roundRect)c.roundRect(-half_w+6,-half_h+10,w-12,h*0.45,5);
  else c.rect(-half_w+6,-half_h+10,w-12,h*0.45);c.fill();

  // Windshield
  c.fillStyle='rgba(147,210,255,.55)';c.beginPath();
  if(c.roundRect)c.roundRect(-half_w+9,-half_h+13,w-18,12,3);
  else c.rect(-half_w+9,-half_h+13,w-18,12);c.fill();

  // Trim stripe
  c.strokeStyle=sk.trim;c.lineWidth=2;
  c.beginPath();c.moveTo(-half_w,0);c.lineTo(half_w,0);c.stroke();

  // Side windows
  c.fillStyle='rgba(147,210,255,.3)';
  c.fillRect(-half_w+8,-3,8,14);
  c.fillRect(half_w-16,-3,8,14);

  // Wheels
  c.fillStyle='#0f172a';
  [[-half_w-4,-h/3],[half_w+4,-h/3],[-half_w-4,h/4],[half_w+4,h/4]].forEach(([wx,wy])=>{
    c.beginPath();c.ellipse(wx,wy,6,9,0,0,Math.PI*2);c.fill();
    c.strokeStyle='rgba(255,255,255,.2)';c.lineWidth=1;c.stroke();
    // Rim
    c.strokeStyle=sk.trim;c.lineWidth=1.5;
    c.beginPath();c.ellipse(wx,wy,3,4,0,0,Math.PI*2);c.stroke();
  });

  // Headlights / taillights
  if(isPlayer){
    // Headlights (front = top)
    c.fillStyle='#fef9c3';c.shadowColor='#fef9c3';c.shadowBlur=10;
    [[-half_w+3,-half_h+2],[half_w-11,-half_h+2]].forEach(([lx,ly])=>c.fillRect(lx,ly,8,4));
    // Taillights
    c.fillStyle='#ef4444';c.shadowColor='#ef4444';c.shadowBlur=8;
    [[-half_w+3,half_h-6],[half_w-11,half_h-6]].forEach(([lx,ly])=>c.fillRect(lx,ly,8,4));
    // Exhaust when nitro
    if(nitroActive){
      c.fillStyle='rgba(249,115,22,.8)';c.shadowColor='#f97316';c.shadowBlur=15;
      for(let i=0;i<3;i++){
        const ex=-5+i*5,ey=half_h+5+Math.random()*12;
        c.beginPath();c.ellipse(ex,ey,3,5,0,0,Math.PI*2);c.fill();
      }
    }
  }
  c.shadowBlur=0;
  c.restore();
}

// ── END GAME ──────────────────────────────────────────────
function endGame(){
  running=false;cancelAnimationFrame(animId);
  document.getElementById('hud').style.display='none';
  document.getElementById('dpad').style.display='none';
  document.getElementById('q-banner').style.display='none';
  document.getElementById('boost-bar-wrap').style.display='none';

  const won=car.score>=60||totalAnswered>=12;
  document.getElementById('res-medal').textContent=car.score>120?'🏆':car.score>60?'🥈':car.score>30?'🥉':'🎖';
  document.getElementById('res-title').textContent=won?'Champion !':'Bonne course !';
  document.getElementById('res-pts').textContent=car.score+' pts';
  document.getElementById('res-sub').textContent=car.score>100?'Incroyable !':car.score>60?'Belle performance !':'Continue à pratiquer !';
  document.getElementById('rs-correct').textContent=totalAnswered;
  document.getElementById('rs-wrong').textContent=totalWrong;
  document.getElementById('rs-combo').textContent='x'+maxCombo;
  document.getElementById('rs-speed').textContent=maxSpeed+' km/h';
  document.getElementById('result-scr').classList.add('on');

  if(won) window.parent.postMessage({type:'gameResult',won:true,myScore:car.score,game:'car'},'*');
}

// ── INPUT ─────────────────────────────────────────────────
let touchStartX=null,lastKeyTime=0;

function bindInput(){
  document.addEventListener('keydown',onKey,{once:false});

  // Swipe
  canvas.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;},{passive:true});
  canvas.addEventListener('touchend',e=>{
    if(touchStartX===null)return;
    const dx=e.changedTouches[0].clientX-touchStartX;
    if(Math.abs(dx)>30){dx<0?moveLeft():moveRight();}
    touchStartX=null;
  },{passive:true});

  // D-pad
  const l=document.getElementById('dpad-left'),r=document.getElementById('dpad-right');
  const u=document.getElementById('dpad-up'),d=document.getElementById('dpad-down');
  const nb=document.getElementById('nitro-btn');
  if(l){l.addEventListener('touchstart',e=>{moveLeft();e.preventDefault();},{passive:false});l.addEventListener('mousedown',moveLeft);}
  if(r){r.addEventListener('touchstart',e=>{moveRight();e.preventDefault();},{passive:false});r.addEventListener('mousedown',moveRight);}
  if(u){u.addEventListener('touchstart',e=>{window._baseSpeed=Math.min(7,window._baseSpeed+0.5);e.preventDefault();},{passive:false});}
  if(d){d.addEventListener('touchstart',e=>{window._baseSpeed=Math.max(1.5,window._baseSpeed-0.5);e.preventDefault();},{passive:false});}
  if(nb){nb.addEventListener('click',activateNitro);nb.addEventListener('touchstart',e=>{activateNitro();e.preventDefault();},{passive:false});}
}

function onKey(e){
  const now=Date.now();if(now-lastKeyTime<80)return;lastKeyTime=now;
  if(e.key==='ArrowLeft'||e.key==='a'){moveLeft();e.preventDefault();}
  if(e.key==='ArrowRight'||e.key==='d'){moveRight();e.preventDefault();}
  if(e.key===' '||e.key==='ArrowUp'){activateNitro();e.preventDefault();}
}

function moveLeft(){if(!running||!car.alive)return;if(car.lane>0){car.lane--;car.targetX=laneX(car.lane);car.skidX=8;}}
function moveRight(){if(!running||!car.alive)return;if(car.lane<LANES-1){car.lane++;car.targetX=laneX(car.lane);car.skidX=-8;}}

// ── UTILS ─────────────────────────────────────────────────
function showToast(msg){
  const el=document.getElementById('pu-toast');
  el.textContent=msg;el.style.opacity='1';
  clearTimeout(el._t);el._t=setTimeout(()=>el.style.opacity='0',1800);
}

function lerpColor(a,b,t){
  const ah=a.replace('#',''),bh=b.replace('#','');
  const ar=parseInt(ah.slice(0,2),16),ag=parseInt(ah.slice(2,4),16),ab2=parseInt(ah.slice(4,6),16);
  const br=parseInt(bh.slice(0,2),16),bg=parseInt(bh.slice(2,4),16),bb2=parseInt(bh.slice(4,6),16);
  const r=Math.round(ar+(br-ar)*t).toString(16).padStart(2,'0');
  const g=Math.round(ag+(bg-ag)*t).toString(16).padStart(2,'0');
  const b2=Math.round(ab2+(bb2-ab2)*t).toString(16).padStart(2,'0');
  return '#'+r+g+b2;
}

buildSkinGrid();
